<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: "%Y" }} Ranji Raj. All rights reserved.</p>
      <p>
        <a href="https://www.youtube.com/@RanjiRaj18" target="_blank" rel="noopener">YouTube</a>
      </p>
    </div>
  </footer>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  {% if page.layout == 'subject' %}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var buyBtn = document.getElementById('rzp-buy-btn');
      var pdfData = document.getElementById('pdf-data');

      if (buyBtn && pdfData) {
        var amount = parseInt(buyBtn.getAttribute('data-amount')) * 100;
        var name = buyBtn.getAttribute('data-name');

        buyBtn.addEventListener('click', function () {
          var options = {
            key: "{{ site.razorpay_key }}",
            amount: amount,
            currency: "INR",
            name: "{{ site.title }}",
            description: name + " Notes (PDF)",
            handler: function (response) {
              var url = atob(pdfData.getAttribute('data-ref'));
              var a = document.createElement('a');
              a.href = url;
              a.download = '';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              buyBtn.textContent = '\u2713 Payment Successful \u2014 Downloading\u2026';
              buyBtn.disabled = true;
              buyBtn.classList.add('btn-success');
            },
            theme: { color: "#5f259f" }
          };
          var rzp = new Razorpay(options);
          rzp.on('payment.failed', function () {
            alert('Payment failed. Please try again.');
          });
          rzp.open();
        });
      }
    });
  </script>
  {% endif %}
</body>
</html>
